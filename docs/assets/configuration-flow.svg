<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="640" viewBox="0 0 1040 640" role="img" aria-labelledby="title desc">
  <title id="title">Configuration file structure for xDev.IBatisNet</title>
  <desc id="desc">A guide image showing where SqlMap.config, providers.config, database.config, and Maps XML files should be placed.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#182230" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
  </defs>
  <rect width="1040" height="640" rx="8" fill="#ffffff"/>
  <text x="54" y="60" fill="#182230" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Cấu trúc file triển khai</text>
  <text x="54" y="92" fill="#596579" font-family="Segoe UI, Arial, sans-serif" font-size="16">Console/Windows app đặt cạnh file .exe; web app đặt cùng tầng với web.config.</text>

  <g filter="url(#shadow)">
    <rect x="56" y="136" width="330" height="370" rx="8" fill="#111827"/>
    <text x="84" y="176" fill="#e5edf6" font-family="Consolas, monospace" font-size="17">AppRoot/</text>
    <text x="110" y="214" fill="#8bd9cf" font-family="Consolas, monospace" font-size="16">SqlMap.config</text>
    <text x="110" y="252" fill="#f4c46b" font-family="Consolas, monospace" font-size="16">providers.config</text>
    <text x="110" y="290" fill="#93c5fd" font-family="Consolas, monospace" font-size="16">database.config</text>
    <text x="110" y="328" fill="#e5edf6" font-family="Consolas, monospace" font-size="16">Maps/</text>
    <text x="136" y="366" fill="#c7d2fe" font-family="Consolas, monospace" font-size="16">MSSQL/SqlClient/</text>
    <text x="162" y="404" fill="#e5edf6" font-family="Consolas, monospace" font-size="16">Account.xml</text>
    <text x="162" y="442" fill="#e5edf6" font-family="Consolas, monospace" font-size="16">Order.xml</text>
    <text x="162" y="480" fill="#e5edf6" font-family="Consolas, monospace" font-size="16">Category.xml</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="526" y="124" width="350" height="92" rx="8" fill="#eef5f4" stroke="#c5ddd9"/>
    <text x="552" y="162" fill="#115e59" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">1. SqlMap.config</text>
    <text x="552" y="190" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">Load properties, provider, database và danh sách map.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="526" y="266" width="350" height="92" rx="8" fill="#fff8e8" stroke="#edd49a"/>
    <text x="552" y="304" fill="#8a5a0a" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">2. providers.config</text>
    <text x="552" y="332" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">Chọn provider, connection class và parameter prefix.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="526" y="408" width="350" height="92" rx="8" fill="#edf4ff" stroke="#c7dcff"/>
    <text x="552" y="446" fill="#1d4ed8" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">3. Maps/*.xml</text>
    <text x="552" y="474" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">Khai báo resultMap, parameterMap và statement id.</text>
  </g>

  <path d="M 386 214 C 430 196 470 178 513 170" stroke="#0f766e" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 386 252 C 428 278 470 304 513 312" stroke="#0f766e" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 386 404 C 430 424 468 444 513 454" stroke="#0f766e" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <rect x="56" y="554" width="820" height="42" rx="8" fill="#f6f8fb" stroke="#d9e1ea"/>
  <text x="84" y="581" fill="#182230" font-family="Segoe UI, Arial, sans-serif" font-size="16">Gợi ý: giữ tên file legacy trước, rồi thay từng map khi cần hiện đại hóa.</text>
</svg>
