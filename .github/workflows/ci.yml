name: CI

on:
  push:
    branches:
      - master
      - "codex/**"
    tags:
      - "v*"
      - "test-v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      publishFeed:
        description: "Optional package feed to publish after a successful build"
        required: true
        default: "none"
        type: choice
        options:
          - "none"
          - "github-packages"
          - "nuget-test"
          - "nuget-org"
          - "nuget-test-and-github"
          - "nuget-org-and-github"
      packageVersion:
        description: "Optional package version, for example 1.6.2-xdev.2. Leave blank for auto."
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build
    runs-on: windows-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      NUGET_TEST_API_KEY: ${{ secrets.NUGET_TEST_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore .NET 10 solution
        run: dotnet restore xDev.IBatisNet.slnx

      - name: Build .NET 10 solution
        run: dotnet build xDev.IBatisNet.slnx -c Release --no-restore

      - name: Run security tests
        run: dotnet run --project tests\XDev.IBatisNet.SecurityTests\XDev.IBatisNet.SecurityTests.csproj -c Release --no-build

      - name: Run integration performance smoke
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          dotnet run --project examples\XDev.IBatisNet.IntegrationPerf\XDev.IBatisNet.IntegrationPerf.csproj `
            -c Release `
            --no-build `
            -- `
            --iterations 5 `
            --warmup 1 `
            --max-p95-ms 5000 `
            --report artifacts\integration-perf.md

      - name: Upload integration performance report
        uses: actions/upload-artifact@v7
        with:
          name: xDev.IBatisNet-integration-perf
          path: artifacts/integration-perf.md

      - name: Restore .NET Framework 4.0 reference assemblies
        id: netfx40
        shell: pwsh
        run: |
          $projDir = Join-Path $env:RUNNER_TEMP "netfx-reference-assemblies"
          dotnet new classlib -n ReferenceAssemblyRestore -o $projDir
          dotnet add "$projDir\ReferenceAssemblyRestore.csproj" package Microsoft.NETFramework.ReferenceAssemblies.net40 --version 1.0.3
          $refPath = Join-Path $env:USERPROFILE ".nuget\packages\microsoft.netframework.referenceassemblies.net40\1.0.3\build\.NETFramework\v4.0"
          if (-not (Test-Path $refPath)) {
            throw "Could not find .NET Framework 4.0 reference assemblies at $refPath."
          }
          "path=$refPath" >> $env:GITHUB_OUTPUT

      - name: Build legacy .NET Framework compatibility solution
        run: dotnet msbuild DataMapper.2010.sln /p:Configuration=Release /p:TargetFrameworkVersion=v4.0 /p:FrameworkPathOverride="${{ steps.netfx40.outputs.path }}" /v:minimal

      - name: Publish XML Debugger portable build
        shell: pwsh
        run: |
          $debuggerVersion = "0.0.${{ github.run_number }}-ci"
          if ("${{ github.ref }}" -like "refs/tags/test-v*") {
            $debuggerVersion = "${{ github.ref_name }}".Substring("test-v".Length)
          } elseif ("${{ github.ref }}" -like "refs/tags/v*") {
            $debuggerVersion = "${{ github.ref_name }}".Substring("v".Length)
          }

          $debuggerVersion = $debuggerVersion -replace '[^0-9A-Za-z._-]', '-'
          $publishDir = Join-Path $PWD "artifacts\xml-debugger\win-x64"
          dotnet publish tools\XDev.IBatisNet.XmlDebugger\XDev.IBatisNet.XmlDebugger.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:DebugType=embedded `
            /p:Version="$debuggerVersion" `
            -o "$publishDir"

          Get-ChildItem $publishDir -Filter *.pdb -Recurse | Remove-Item -Force
          Compress-Archive `
            -Path "$publishDir\*" `
            -DestinationPath "artifacts\xDev.IBatisNet.XmlDebugger-$debuggerVersion-win-x64-portable.zip" `
            -Force

      - name: Upload build outputs
        uses: actions/upload-artifact@v7
        with:
          name: xDev.IBatisNet-binaries
          path: |
            IBatisNet.Common/bin/Release/**
            IBatisNet.DataMapper/bin/Release/**
            IBatisNet.Common.Logging.Log4Net/bin/Release/**
            artifacts/*.zip

      - name: Setup NuGet
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/test-v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publishFeed != 'none')
        uses: NuGet/setup-nuget@v4

      - name: Resolve package publish target
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/test-v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publishFeed != 'none')
        id: publish
        shell: pwsh
        run: |
          $feed = "${{ github.event.inputs.publishFeed }}"
          $version = "${{ github.event.inputs.packageVersion }}"
          $publishGitHubPackages = $false
          $publishNuGetTest = $false
          $publishNuGetOrg = $false

          function Get-AutoPackageVersion {
            $nuspecContent = Get-Content xDev.IBatisNet.nuspec -Raw
            $match = [regex]::Match($nuspecContent, '<version>(?<version>[^<]+)</version>')
            if (-not $match.Success) {
              throw "Could not find package version in xDev.IBatisNet.nuspec."
            }

            $commitCount = git rev-list --count HEAD
            if ([string]::IsNullOrWhiteSpace($commitCount)) {
              $commitCount = "${{ github.run_number }}"
            }

            $baseVersion = $match.Groups["version"].Value
            if ($baseVersion.Contains("-") -and $baseVersion -match '^(?<prefix>.+)\.\d+$') {
              return "$($Matches.prefix).$commitCount"
            }

            return "$baseVersion-ci.$commitCount"
          }

          if ("${{ github.ref }}" -like "refs/tags/test-v*") {
            $publishNuGetTest = $true
            $publishGitHubPackages = $true
            $version = "${{ github.ref_name }}".Substring("test-v".Length)
          } elseif ("${{ github.ref }}" -like "refs/tags/v*") {
            $publishNuGetOrg = $true
            $publishGitHubPackages = $true
            $version = "${{ github.ref_name }}".Substring("v".Length)
          } elseif ("${{ github.ref }}" -eq "refs/heads/master" -and "${{ github.event_name }}" -eq "push") {
            $publishGitHubPackages = $true
          } elseif ("${{ github.event_name }}" -eq "workflow_dispatch") {
            switch ($feed) {
              "github-packages" {
                $publishGitHubPackages = $true
              }
              "nuget-test" {
                $publishNuGetTest = $true
              }
              "nuget-org" {
                $publishNuGetOrg = $true
              }
              "nuget-test-and-github" {
                $publishNuGetTest = $true
                $publishGitHubPackages = $true
              }
              "nuget-org-and-github" {
                $publishNuGetOrg = $true
                $publishGitHubPackages = $true
              }
            }
          }

          $shouldPublish = $publishGitHubPackages -or $publishNuGetTest -or $publishNuGetOrg
          if (-not $shouldPublish) {
            "shouldPublish=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = Get-AutoPackageVersion
          }

          "shouldPublish=true" >> $env:GITHUB_OUTPUT
          "publishGitHubPackages=$($publishGitHubPackages.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "publishNuGetTest=$($publishNuGetTest.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "publishNuGetOrg=$($publishNuGetOrg.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "packageVersion=$version" >> $env:GITHUB_OUTPUT
          if ("${{ github.ref }}" -like "refs/tags/v*" -or "${{ github.ref }}" -like "refs/tags/test-v*") {
            $releaseTag = "${{ github.ref_name }}"
            $isPrerelease = $releaseTag.StartsWith("test-v") -or $version.Contains("-")
            "releaseTag=$releaseTag" >> $env:GITHUB_OUTPUT
            "isPrerelease=$($isPrerelease.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          } else {
            "releaseTag=" >> $env:GITHUB_OUTPUT
            "isPrerelease=false" >> $env:GITHUB_OUTPUT
          }

          $nuspec = Get-Content xDev.IBatisNet.nuspec -Raw
          $nuspec = $nuspec -replace '<version>.*?</version>', "<version>$version</version>"
          Set-Content xDev.IBatisNet.nuspec -Value $nuspec -NoNewline

      - name: Generate NuGet release notes
        if: steps.publish.outputs.shouldPublish == 'true'
        id: notes
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          $version = "${{ steps.publish.outputs.packageVersion }}"
          $notesPath = "artifacts\xDev.IBatisNet-$version-release-notes.md"
          $previousTag = $null
          try {
            $previousTag = git describe --tags --abbrev=0 --match "v*" --match "test-v*" "${{ github.sha }}^" 2>$null
          } catch {
            $previousTag = $null
          }

          $range = if ([string]::IsNullOrWhiteSpace($previousTag)) { "${{ github.sha }}" } else { "$previousTag..${{ github.sha }}" }
          $changes = git log --pretty=format:"- %s (`%h`)" $range
          $changesText = $changes -join "`n"
          if ([string]::IsNullOrWhiteSpace($changesText)) {
            $changesText = "- No commit details available."
          }

          $feeds = @()
          if ("${{ steps.publish.outputs.publishGitHubPackages }}" -eq "true") { $feeds += "GitHub Packages" }
          if ("${{ steps.publish.outputs.publishNuGetTest }}" -eq "true") { $feeds += "NuGet test" }
          if ("${{ steps.publish.outputs.publishNuGetOrg }}" -eq "true") { $feeds += "NuGet.org" }
          if ($feeds.Count -eq 0) { $feeds += "artifact only" }

          $notes = @"
          # xDev.IBatisNet $version

          - Ref: `${{ github.ref_name }}`
          - Commit: `${{ github.sha }}`
          - Run: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
          - Publish target: `$($feeds -join ", ")`

          ## Changes

          $changesText
          "@
          $notes = $notes.Trim()

          Set-Content $notesPath -Value $notes -NoNewline

          [xml]$nuspec = Get-Content xDev.IBatisNet.nuspec -Raw
          $namespace = $nuspec.package.NamespaceURI
          $ns = New-Object System.Xml.XmlNamespaceManager($nuspec.NameTable)
          $ns.AddNamespace("n", $namespace)
          $metadata = $nuspec.SelectSingleNode("/n:package/n:metadata", $ns)
          if ($null -eq $metadata) {
            throw "Could not find metadata node in xDev.IBatisNet.nuspec."
          }

          $releaseNotes = $metadata.SelectSingleNode("n:releaseNotes", $ns)
          if ($null -eq $releaseNotes) {
            $releaseNotes = $nuspec.CreateElement("releaseNotes", $namespace)
            [void]$metadata.AppendChild($releaseNotes)
          }

          $releaseNotes.InnerText = $notes
          $settings = New-Object System.Xml.XmlWriterSettings
          $settings.Indent = $true
          $settings.Encoding = [System.Text.UTF8Encoding]::new($false)
          $writer = [System.Xml.XmlWriter]::Create((Resolve-Path xDev.IBatisNet.nuspec).Path, $settings)
          try {
            $nuspec.Save($writer)
          } finally {
            $writer.Close()
          }

          "path=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Pack NuGet package
        if: steps.publish.outputs.shouldPublish == 'true'
        run: nuget pack xDev.IBatisNet.nuspec -OutputDirectory artifacts -NoDefaultExcludes

      - name: Upload NuGet package artifact
        if: steps.publish.outputs.shouldPublish == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: xDev.IBatisNet-${{ steps.publish.outputs.packageVersion }}
          path: |
            artifacts/*.nupkg
            artifacts/*release-notes.md
            artifacts/*.zip

      - name: Add GitHub Packages source
        if: steps.publish.outputs.publishGitHubPackages == 'true'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget add source `
            --username "${{ github.actor }}" `
            --password "$env:GITHUB_TOKEN" `
            --store-password-in-clear-text `
            --name github `
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Publish to GitHub Packages
        if: steps.publish.outputs.publishGitHubPackages == 'true'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Get-ChildItem artifacts -Filter *.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName --api-key "$env:GITHUB_TOKEN" --source "github" --skip-duplicate
          }

      - name: Publish to NuGet.org
        if: steps.publish.outputs.publishNuGetOrg == 'true'
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw "Missing GitHub secret NUGET_API_KEY."
          }
          Get-ChildItem artifacts -Filter *.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName --api-key "$env:NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
          }

      - name: Publish to NuGet test
        if: steps.publish.outputs.publishNuGetTest == 'true'
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_TEST_API_KEY)) {
            throw "Missing GitHub secret NUGET_TEST_API_KEY."
          }
          Get-ChildItem artifacts -Filter *.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName --api-key "$env:NUGET_TEST_API_KEY" --source "https://apiint.nugettest.org/v3/index.json" --skip-duplicate
          }

      - name: Publish GitHub release for package tags
        if: steps.publish.outputs.shouldPublish == 'true' && steps.publish.outputs.releaseTag != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.publish.outputs.releaseTag }}"
          $version = "${{ steps.publish.outputs.packageVersion }}"
          $title = "xDev.IBatisNet $version"
          $notesPath = "${{ steps.notes.outputs.path }}"
          $assets = Get-ChildItem artifacts -File |
            Where-Object { $_.Name -like "*.nupkg" -or $_.Name -like "*release-notes.md" -or $_.Name -like "*.zip" } |
            Sort-Object Name |
            ForEach-Object { $_.FullName }
          $isPrerelease = "${{ steps.publish.outputs.isPrerelease }}" -eq "true"

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --title "$title" --notes-file "$notesPath"
            if ($assets) {
              gh release upload $tag @assets --clobber
            }
          } else {
            $arguments = @("release", "create", $tag)
            $arguments += $assets
            $arguments += @("--title", $title, "--notes-file", $notesPath)
            if ($isPrerelease) {
              $arguments += "--prerelease"
            }

            gh @arguments
          }
