name: CI

on:
  push:
    branches:
      - master
      - "codex/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: windows-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore .NET 10 solution
        run: dotnet restore xDev.IBatisNet.slnx

      - name: Build .NET 10 solution
        run: dotnet build xDev.IBatisNet.slnx -c Release --no-restore

      - name: Build legacy .NET Framework solution as net48
        run: dotnet msbuild DataMapper.2010.sln /p:Configuration=Release /p:TargetFrameworkVersion=v4.8 /v:minimal

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: xDev.IBatisNet-binaries
          path: |
            IBatisNet.Common/bin/Release/**
            IBatisNet.DataMapper/bin/Release/**
            IBatisNet.Common.Logging.Log4Net/bin/Release/**

      - name: Setup NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        uses: NuGet/setup-nuget@v2

      - name: Resolve package version
        if: startsWith(github.ref, 'refs/tags/v')
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Package version is required."
          }
          "packageVersion=$version" >> $env:GITHUB_OUTPUT
          $nuspec = Get-Content xDev.IBatisNet.nuspec -Raw
          $nuspec = $nuspec -replace '<version>.*?</version>', "<version>$version</version>"
          Set-Content xDev.IBatisNet.nuspec -Value $nuspec -NoNewline

      - name: Pack NuGet package
        if: startsWith(github.ref, 'refs/tags/v')
        run: nuget pack xDev.IBatisNet.nuspec -OutputDirectory artifacts -NoDefaultExcludes

      - name: Upload NuGet package artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: xDev.IBatisNet-${{ steps.version.outputs.packageVersion }}
          path: artifacts/*.nupkg

      - name: Publish to NuGet.org
        if: startsWith(github.ref, 'refs/tags/v') && env.NUGET_API_KEY != ''
        shell: pwsh
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "$env:NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
